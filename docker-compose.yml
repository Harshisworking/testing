services:
  frontend:
    build: ./frontend
    # No ports here; your docker-proxy.yml will handle the external port
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgres://user:pass@db:5432/counts
      - PORT=3002
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=counts
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
